<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ボーカル・ピッチエディタ</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="toolbar">
    <div class="tgroup">
      <span class="tgroup-label">Source</span>
      <label class="filebtn">
        音声を開く
        <input id="file" type="file" accept=".wav,.flac,.aiff,.aif" hidden />
      </label>
      <label class="filebtn alt">
        伴奏を追加
        <input id="bfile" type="file" accept="audio/*" hidden disabled />
      </label>
    </div>
    <span class="sep"></span>

    <div class="tgroup">
      <span class="tgroup-label">Rec</span>
      <button id="record" class="rec">● 録音</button>
      <label class="slider" title="テンポ（小節線・メトロノーム）">♩=<input id="bpm" type="number" min="30" max="300" step="1" value="120" style="width:52px" /></label>
      <label class="slider" title="拍子（1小節の拍数）">拍子
        <select id="beats">
          <option value="2">2/4</option>
          <option value="3">3/4</option>
          <option value="4" selected>4/4</option>
          <option value="5">5/4</option>
          <option value="6">6/8</option>
        </select>
      </label>
      <button id="metro" class="tgl on" title="メトロノーム（録音中に鳴らす）">🔔</button>
      <span id="meter" class="meter" hidden><span id="meterbar" class="meterbar"></span><span id="meterlabel">-∞</span></span>
    </div>
    <span class="sep"></span>

    <div class="tgroup">
      <span class="tgroup-label">Transport</span>
      <button id="play" disabled>▶ 再生</button>
      <button id="stop" disabled>■ 停止</button>
      <button id="tostart" title="再生位置を先頭に戻す" disabled>↩︎</button>
    </div>
    <span class="sep"></span>

    <div class="tgroup">
      <span class="tgroup-label">Mix</span>
      <label class="slider">Master <input id="master" type="range" min="-24" max="6" step="0.5" value="0" /><span id="masterval">0dB</span></label>
      <label class="slider">補正 <input id="strength" type="range" min="0" max="1" step="0.05" value="0" disabled /><span id="strengthval">–</span></label>
      <label class="slider">残響 <input id="reverb" type="range" min="0" max="1" step="0.05" value="0" /><span id="reverbval">0%</span></label>
    </div>
    <span class="sep"></span>

    <div class="tgroup">
      <span class="tgroup-label">History</span>
      <button id="undo" title="元に戻す (Cmd/Ctrl+Z)" disabled>↶</button>
      <button id="redo" title="やり直し (Cmd/Ctrl+Shift+Z)" disabled>↷</button>
      <button id="zoomout" title="縮小" disabled>－</button>
      <button id="zoomin" title="拡大" disabled>＋</button>
      <label class="filebtn alt2">プロジェクト読込<input id="projfile" type="file" accept=".json" hidden /></label>
      <button id="projsave" title="プロジェクト保存" disabled>保存</button>
    </div>
    <span class="sep"></span>

    <div class="tgroup">
      <span class="tgroup-label">Export</span>
      <label class="slider">形式
        <select id="fmt">
          <option value="wav">WAV</option>
          <option value="flac">FLAC</option>
          <option value="mp3">MP3</option>
        </select>
      </label>
      <label class="chk"><input id="normalize" type="checkbox" /> -1dBTP正規化</label>
      <button id="export" disabled>⬇ 書き出し</button>
    </div>
    <span class="sep"></span>

    <label class="snaplabel">スナップ: <span id="snap">50 cent</span></label>
    <span id="status" class="status"></span>
  </header>
  <div class="hintbar">
    縦ドラッグ=音高(<b>Shift</b>=1c/Alt=100c) ・ <b>S</b>=分割 ・ 分割線ダブルクリック=結合 ・
    分割線ドラッグ=位置 ・ <b>Ctrl</b>+分割線ドラッグ=遷移区間 ・ <b>G</b>+縦ドラッグ=音量 ・ <b>M</b>=ミュート ・
    空き領域ドラッグ=<b>範囲選択</b> ・ <b>A</b>+クリック=追加選択（選択バーは一括操作）・
    <b>Cmd/Ctrl+C</b>→カーソルを置いて<b>V</b>=<b>ハモリを任意音程で複製</b> ・ <b>Delete</b>=ハモリ削除
  </div>

  <div id="editor" class="editor">
    <div class="keyswrap"><canvas id="keys"></canvas></div>
    <div class="gridwrap"><canvas id="grid"></canvas><div id="playhead" class="playhead" hidden><span class="phgrab" title="ドラッグで再生位置を移動"></span></div></div>
  </div>

  <div id="backinglane" class="backinglane" hidden>
    <div class="backctrls">
      <span class="blabel">伴奏</span>
      <label>音量 <input id="bvol" type="range" min="-24" max="6" step="0.5" value="0" /></label>
      <button id="bmute" class="tgl" title="ミュート">M</button>
      <button id="bsolo" class="tgl" title="ソロ">S</button>
      <label>頭合わせ <input id="boffset" type="number" step="0.001" value="0" />s</label>
      <button id="bremove" title="伴奏を外す">×</button>
    </div>
    <div class="bwrap"><canvas id="bcanvas"></canvas><div id="bplayhead" class="playhead" hidden></div></div>
  </div>

  <script src="/static/pitchlogic.js"></script>
  <script src="/static/reclogic.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
