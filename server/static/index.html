<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ボーカル・ピッチエディタ</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="toolbar">
    <label class="filebtn">
      音声を開く
      <input id="file" type="file" accept=".wav,.flac,.aiff,.aif" hidden />
    </label>
    <button id="play" disabled>▶ 再生</button>
    <button id="stop" disabled>■ 停止</button>
    <span class="sep"></span>
    <label class="slider">Master <input id="master" type="range" min="-24" max="6" step="0.5" value="0" /><span id="masterval">0dB</span></label>
    <label class="slider">補正 <input id="strength" type="range" min="0" max="1" step="0.05" value="0" disabled /><span id="strengthval">–</span></label>
    <span class="sep"></span>
    <label class="slider">形式
      <select id="fmt">
        <option value="wav">WAV</option>
        <option value="flac">FLAC</option>
        <option value="mp3">MP3</option>
      </select>
    </label>
    <label class="chk"><input id="normalize" type="checkbox" /> -1dBTP正規化</label>
    <button id="export" disabled>⬇ 書き出し</button>
    <span class="sep"></span>
    <label class="snaplabel">スナップ: <span id="snap">50 cent</span></label>
    <span id="status" class="status"></span>
  </header>
  <div class="hintbar">
    縦ドラッグ=音高(<b>Shift</b>=1c/Alt=100c) ・ <b>S</b>=分割 ・ 分割線ダブルクリック=結合 ・
    分割線ドラッグ=位置 ・ <b>Ctrl</b>+分割線ドラッグ=遷移区間 ・ <b>G</b>+縦ドラッグ=音量 ・ <b>M</b>=ミュート
  </div>

  <div id="editor" class="editor">
    <div class="keyswrap"><canvas id="keys"></canvas></div>
    <div class="gridwrap"><canvas id="grid"></canvas></div>
  </div>

  <script src="/static/pitchlogic.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
